name: UCollyx Production Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4 # Upgraded to latest v4

      # 🚀 STEP: Connect to EC2 via SSH and deploy code safely
      - name: Deploy static files to AWS EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/test-deployments/ucollyx-test-app
            cd /home/ubuntu/test-deployments/ucollyx-test-app
            echo "Deploying fresh artifacts..."

      # 🟢 NOTIFY UCOLLYX ON SUCCESS
      - name: Broadcast Success to UCollyx Ecosystem
        if: success()
        run: |
          PROJECT_ID="${{ secrets.UCOLLYX_PROJECT_ID || 1}}"
          VERSION="v1.0.${{ github.run_number }}" # Automatically increments on every run (e.g. v1.0.1, v1.0.2)
          ENV_TYPE="prod"
          STATUS="Success" # Matches backend ENUM capitalization
          LOG_SUMMARY="HTML layout deployed cleanly on AWS EC2 environment."
          LOG_OUTPUT="GitHub Actions Workflow: Success\nBranch: main\nCommit: ${{ github.sha }}\nRunner ID: ${{ github.run_id }}"

          curl -X POST http://51.21.194.171/api/webhooks/pipeline-status \
            -H "Content-Type: application/json" \
            -d "{
              \"project_id\": \"$PROJECT_ID\",
              \"status\": \"$STATUS\",
              \"version\": \"$VERSION\",
              \"env\": \"$ENV_TYPE\",
              \"log_summary\": \"$LOG_SUMMARY\",
              \"log_output\": \"$LOG_OUTPUT\"
            }"

      # 🔴 NOTIFY UCOLLYX ON FAILURE
      - name: Broadcast Failure to UCollyx Ecosystem
        if: failure()
        run: |
          PROJECT_ID="${{ secrets.UCOLLYX_PROJECT_ID || 1}}"
          VERSION="v1.0.${{ github.run_number }}"
          ENV_TYPE="prod"
          STATUS="Failed" # Matches backend ENUM capitalization
          LOG_SUMMARY="Pipeline compilation or synchronization crashed."
          LOG_OUTPUT="GitHub Actions Workflow: Failed\nBranch: main\nCheck logs for runner execution failure details."

          curl -X POST http://51.21.194.171/api/webhooks/pipeline-status \
            -H "Content-Type: application/json" \
            -d "{
              \"project_id\": \"$PROJECT_ID\",
              \"status\": \"$STATUS\",
              \"version\": \"$VERSION\",
              \"env\": \"$ENV_TYPE\",
              \"log_summary\": \"$LOG_SUMMARY\",
              \"log_output\": \"$LOG_OUTPUT\"
            }"